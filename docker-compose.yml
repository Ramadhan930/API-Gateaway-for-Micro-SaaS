services:
  db:
    image: postgres:15-alpine 
    container_name: ticket_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password_rahasia}
      POSTGRES_DB: ${DB_NAME:-ticket_saas_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: